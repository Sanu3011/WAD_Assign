<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assignment 1B</title>

  <link rel="stylesheet" href="./bootstrap.min.css" />
</head>

<body>

<div class="container">

  <button class="btn btn-outline-success mt-5"
    data-toggle="modal"
    data-target="#addNewUser">
    Add New User
  </button>

  <table class="table table-striped table-bordered my-5">
    <thead>
      <tr>
        <th>Sr No</th>
        <th>Name</th>
        <th>Username</th>
        <th>Email</th>
        <th>Phone</th>
        <th>City</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <!-- Modal -->
  <div class="modal fade" id="addNewUser">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Enter Details</h5>
          <button type="button" class="close" data-dismiss="modal">
            <span>&times;</span>
          </button>
        </div>

        <div class="modal-body">

          <form id="userForm">

            <input class="form-control my-2" id="name" placeholder="Name" required>
            <input class="form-control my-2" id="username" placeholder="Username" required>
            <input class="form-control my-2" id="email" placeholder="Email" required>
            <input class="form-control my-2" id="phone" placeholder="Phone" required>
            <input class="form-control my-2" id="city" placeholder="City" required>
            <input class="form-control my-2" id="password" type="password" placeholder="Password" required>

            <button type="submit" class="btn btn-primary w-100">
              Submit
            </button>

          </form>

        </div>

      </div>
    </div>
  </div>

</div>

<script src="./jquery.slim.min.js"></script>
<script src="./popper.min.js"></script>
<script src="./bootstrap.min.js"></script>

<script src="./wad1b.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FreshMart Dashboard</title>

<!-- Bootstrap -->
<link href="./bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar p-3">
        <h4 class="mb-4">FreshMart</h4>

        <a href="#dashboard-page">Dashboard</a>
        <a href="#products-page">Products</a>
        <a href="#orders-page">Orders</a>
        <a href="#customers-page">Customers</a>
        <a href="Customers/index.html">Add Customers</a>    
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">

        <!-- Header -->
        <div class="header d-flex justify-content-between align-items-center mb-4 shadow-sm">
            <h5>Welcome Back</h5>
            <input type="text" class="form-control w-25" placeholder="Search...">
        </div>

        <!-- Dashboard -->
        <div id="dashboard-page" class="page">
            <h2>Dashboard</h2>

            <div class="row g-4 my-3">

                <div class="col-md-3">
                    <div class="card shadow p-3">
                        <h6 class="text-muted">Customers</h6>
                        <h2>2</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow p-3">
                        <h6 class="text-muted">Products</h6>
                        <h2>2</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow p-3">
                        <h6 class="text-muted">Orders</h6>
                        <h2>2</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow p-3">
                        <h6 class="text-muted">Revenue</h6>
                        <h2>₹1200</h2>
                    </div>
                </div>

            </div>

            <!-- Orders Table -->
            <div class="card shadow p-3">
                <h5 class="mb-3">Recent Orders</h5>

                <table class="table table-hover">
                    <thead class="table-success">
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Rahul</td>
                            <td>Chocolate Cake</td>
                            <td><span class="badge bg-success">Delivered</span></td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Sneha</td>
                            <td>Red Velvet</td>
                            <td><span class="badge bg-warning">Pending</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Products -->
        <div id="products-page" class="page">
            <h2>Products</h2>

            <div class="card shadow p-3">
                <table class="table table-striped">
                    <thead class="table-success">
                        <tr>
                            <th>Name</th>
                            <th>Price</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>Chocolate Cake</td>
                            <td>₹500</td>
                        </tr>
                        <tr>
                            <td>Red Velvet</td>
                            <td>₹700</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

       
    </div>
</div>
</div>

</body>
</html>

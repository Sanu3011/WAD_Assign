<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Dashboard</title>

<!-- Bootstrap -->
<link href="./bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fb;
    font-family: 'Segoe UI', sans-serif;
}

/* Sidebar */
.sidebar {
    height: 100vh;
    background: linear-gradient(180deg, #4e73df, #224abe);
    color: white;
}

.sidebar a {
    color: white;
    text-decoration: none;
    display: block;
    padding: 12px;
    border-radius: 8px;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}

/* Cards */
.card {
    border: none;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Header */
.header {
    background: white;
    padding: 10px 20px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar p-3">
        <h4 class="mb-4">Dashboard</h4>

        <a href="#">Home</a>
        <a href="#">Analytics</a>
        <a href="#">Products</a>
        <a href="#">Customers</a>
        <a href="#">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">

        <!-- Header -->
        <div class="header d-flex justify-content-between align-items-center mb-4 shadow-sm">
            <h5>Welcome Back </h5>
            <input type="text" class="form-control w-25" placeholder="Search...">
        </div>

        <!-- Cards -->
        <div class="row g-4">

            <div class="col-md-3">
                <div class="card shadow p-3">
                    <h6>Total Users</h6>
                    <h2>1,250</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow p-3">
                    <h6>Revenue</h6>
                    <h2>₹45,000</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow p-3">
                    <h6>Orders</h6>
                    <h2>320</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow p-3">
                    <h6>Products</h6>
                    <h2>85</h2>
                </div>
            </div>

        </div>

        <!-- Table -->
        <div class="card shadow mt-5 p-3">
            <h5 class="mb-3">Recent Orders</h5>

            <table class="table table-hover">
                <thead class="table-primary">
                    <tr>
                        <th>#</th>
                        <th>Customer</th>
                        <th>Product</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Rahul</td>
                        <td>Chocolate Cake</td>
                        <td><span class="badge bg-success">Delivered</span></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Sneha</td>
                        <td>Red Velvet</td>
                        <td><span class="badge bg-warning">Pending</span></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Amit</td>
                        <td>Black Forest</td>
                        <td><span class="badge bg-danger">Cancelled</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>
</div>

</body>
</html>
